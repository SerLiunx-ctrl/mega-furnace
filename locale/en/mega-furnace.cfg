[item-description]
mega-furnace=A gigantic late-game electric furnace for extreme-throughput smelting lines.
mega-furnace-2=A larger-scale refractory composite furnace built for endgame smelting throughput and heavy power draw.
mega-inserter=A late-game bulk inserter built for giant furnaces and extreme-throughput production lines.
mega-transport-belt=A reinforced transport belt for endgame high-throughput bus designs.
mega-underground-belt=A faster underground belt with longer span for heavy logistics lines.
mega-splitter=A late-game splitter designed for matching the high-throughput belt tier.
mega-mining-field=A prototype centralized mining structure that outputs the selected ore once per second after a mining drill is installed.

[technology-description]
mega-furnace=Tired of placing huge arrays of electric furnaces? Try this instead.
mega-furnace-2=Pushes the giant furnace concept further with higher throughput and a heavier power budget.
mega-inserter=Upgrades late-game logistics with stronger drive systems and heavier bulk handling.
mega-logistics=Unlocks a matching high-throughput belt tier for giant furnaces and endgame logistics lines.
mega-mining-field=Unlocks a prototype mining field that converts installed mining drills into a centralized ore output.

