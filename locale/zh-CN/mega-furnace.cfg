[item-description]
mega-furnace=面向超高吞吐冶炼线的巨型后期电炉。
mega-furnace-2=进一步强化吞吐、能耗与结构规格的高能巨型电炉。
mega-inserter=面向巨型电炉与超高吞吐产线的后期大批量机械臂。
mega-transport-belt=服务于终局高吞吐产线的强化传送带。
mega-underground-belt=拥有更高带速与更长跨距的高吞吐地下传送带。
mega-splitter=适配高吞吐物流总线的终局分流器。
mega-mining-field=安装矿机后，以每秒一次的节拍产出所选矿物的集中采矿设施原型。

[technology-description]
mega-furnace=厌倦了大批量的铺设电炉吗？试试这个吧。
mega-furnace-2=进一步提升巨型电炉的吞吐与功率上限。
mega-inserter=通过更强的驱动与堆叠搬运能力，为终局大批量物流提供支持。
mega-logistics=为巨型电炉和终局总线配套的高吞吐传送带系列。
mega-mining-field=解锁一个可安装矿机并集中输出矿物的采矿场原型。

